openapi: 3.0.3
info:
  title: Odoo Cafe POS API
  version: 1.0.0
  description: Restaurant Point of Sale System API - Complete backend for managing
    orders, payments, kitchen display, and more.
paths:
  /api/:
    get:
      operationId: root_retrieve
      description: API Root - Lists all available endpoints.
      security:
      - jwtAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/change-password/:
    post:
      operationId: v1_auth_change_password_create
      description: |-
        Change password endpoint.

        POST /api/v1/auth/change-password/
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: |-
        User login endpoint with JWT tokens.

        POST /api/v1/auth/login/
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: |-
        Logout endpoint - blacklists the refresh token.

        POST /api/v1/auth/logout/
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      description: |-
        Get/update current user profile.

        GET /api/v1/auth/me/
        PATCH /api/v1/auth/me/
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: v1_auth_me_update
      description: |-
        Get/update current user profile.

        GET /api/v1/auth/me/
        PATCH /api/v1/auth/me/
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
    patch:
      operationId: v1_auth_me_partial_update
      description: |-
        Get/update current user profile.

        GET /api/v1/auth/me/
        PATCH /api/v1/auth/me/
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
  /api/v1/auth/pin-login/:
    post:
      operationId: v1_auth_pin_login_create
      description: |-
        Quick login using PIN (for POS terminals).

        POST /api/v1/auth/pin-login/
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/set-pin/:
    post:
      operationId: v1_auth_set_pin_create
      description: |-
        Set quick login PIN for POS.

        POST /api/v1/auth/set-pin/
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/signup/:
    post:
      operationId: v1_auth_signup_create
      description: |-
        User registration endpoint.

        POST /api/v1/auth/signup/
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreate'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/users/:
    get:
      operationId: v1_auth_users_list
      description: |-
        List all users or create new user (admin/manager only).

        GET /api/v1/auth/users/
        POST /api/v1/auth/users/
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
          description: ''
    post:
      operationId: v1_auth_users_create
      description: |-
        List all users or create new user (admin/manager only).

        GET /api/v1/auth/users/
        POST /api/v1/auth/users/
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreate'
          description: ''
  /api/v1/auth/users/{id}/:
    get:
      operationId: v1_auth_users_retrieve
      description: |-
        Get, update, or delete a user (admin only).

        GET /api/v1/auth/users/<id>/
        PATCH /api/v1/auth/users/<id>/
        DELETE /api/v1/auth/users/<id>/
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: v1_auth_users_update
      description: |-
        Get, update, or delete a user (admin only).

        GET /api/v1/auth/users/<id>/
        PATCH /api/v1/auth/users/<id>/
        DELETE /api/v1/auth/users/<id>/
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserUpdate'
          description: ''
    patch:
      operationId: v1_auth_users_partial_update
      description: |-
        Get, update, or delete a user (admin only).

        GET /api/v1/auth/users/<id>/
        PATCH /api/v1/auth/users/<id>/
        DELETE /api/v1/auth/users/<id>/
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminUserUpdateRequest'
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserUpdate'
          description: ''
    delete:
      operationId: v1_auth_users_destroy
      description: |-
        Get, update, or delete a user (admin only).

        GET /api/v1/auth/users/<id>/
        PATCH /api/v1/auth/users/<id>/
        DELETE /api/v1/auth/users/<id>/
      parameters:
      - in: path
        name: id
